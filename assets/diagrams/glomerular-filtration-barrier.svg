<svg viewBox="0 0 600 330" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">

  <defs>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="rgba(60,80,180,0.42)"/>
    </marker>
  </defs>

  <rect width="600" height="330" fill="#fff" rx="6"/>

  <!-- TITLE -->
  <text x="300" y="27" text-anchor="middle" font-size="16" font-weight="900"
        fill="#1a1a4a" letter-spacing="2">GLOMERULAR FILTRATION</text>

  <!-- ══ ZONE FILLS ══ -->
  <rect x="14"  y="40" width="180" height="235" fill="rgba(220,65,65,0.09)"/>
  <rect x="194" y="40" width="162" height="235" fill="rgba(90,50,210,0.10)"/>
  <rect x="356" y="40" width="230" height="235" fill="rgba(50,170,100,0.08)"/>

  <!-- ══ OUTER ROUNDED BORDER ══ -->
  <rect x="14" y="40" width="572" height="235" rx="6"
        fill="none" stroke="rgba(140,140,180,0.30)" stroke-width="1.3"/>

  <!-- ══ VERTICAL ZONE DIVIDERS ══ -->
  <line x1="194" y1="40" x2="194" y2="275" stroke="rgba(130,130,170,0.32)" stroke-width="1.2"/>
  <line x1="356" y1="40" x2="356" y2="275" stroke="rgba(130,130,170,0.32)" stroke-width="1.2"/>

  <!-- ══ HEADER BANNERS (h=40, y=40→80) ══ -->
  <rect x="14"  y="40" width="180" height="40" fill="rgba(210,55,55,0.80)"/>
  <text x="104" y="57" text-anchor="middle" font-size="10.5" font-weight="800"
        fill="#fff" letter-spacing="1">1. ENDOTHELIUM</text>

  <rect x="194" y="40" width="162" height="40" fill="rgba(72,40,192,0.82)"/>
  <text x="275" y="56" text-anchor="middle" font-size="10.5" font-weight="800"
        fill="#fff" letter-spacing="0.8">2. BASEMENT MEMBRANE</text>
  <text x="275" y="72" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.80)"
        font-style="italic">collagen IV · laminin · HS(−)</text>

  <!-- Zone 3: text-anchor center at x=481 to clear left border -->
  <rect x="356" y="40" width="230" height="40" fill="rgba(22,128,68,0.82)"/>
  <text x="481" y="56" text-anchor="middle" font-size="10.5" font-weight="800"
        fill="#fff" letter-spacing="0.8">3. EPITHELIUM (PODOCYTE)</text>
  <text x="481" y="72" text-anchor="middle" font-size="7.5" fill="rgba(255,255,255,0.80)"
        font-style="italic">nephrin · podocin</text>

  <!-- ══ ZONE 1 CONTENT: BLOOD / ENDOTHELIUM (y 80–275) ══ -->

  <!-- RBCs -->
  <ellipse cx="74"  cy="119" rx="30" ry="16" fill="rgba(205,48,48,0.75)" stroke="rgba(150,18,18,0.50)" stroke-width="1"/>
  <ellipse cx="74"  cy="119" rx="15" ry="8"  fill="rgba(230,92,92,0.46)"/>
  <ellipse cx="74"  cy="177" rx="30" ry="16" fill="rgba(205,48,48,0.75)" stroke="rgba(150,18,18,0.50)" stroke-width="1"/>
  <ellipse cx="74"  cy="177" rx="15" ry="8"  fill="rgba(230,92,92,0.46)"/>
  <ellipse cx="148" cy="148" rx="30" ry="16" fill="rgba(205,48,48,0.75)" stroke="rgba(150,18,18,0.50)" stroke-width="1"/>
  <ellipse cx="148" cy="148" rx="15" ry="8"  fill="rgba(230,92,92,0.46)"/>

  <!-- Plasma proteins in blood -->
  <ellipse cx="74"  cy="220" rx="11" ry="8" fill="rgba(195,120,35,0.70)" stroke="rgba(145,80,8,0.45)" stroke-width="0.8"/>
  <ellipse cx="148" cy="114" rx="11" ry="8" fill="rgba(195,120,35,0.70)" stroke="rgba(145,80,8,0.45)" stroke-width="0.8"/>
  <ellipse cx="148" cy="213" rx="11" ry="8" fill="rgba(195,120,35,0.70)" stroke="rgba(145,80,8,0.45)" stroke-width="0.8"/>

  <!-- Small molecules in blood -->
  <g fill="rgba(25,125,195,0.60)">
    <circle cx="44"  cy="104" r="5"/>
    <circle cx="118" cy="97"  r="4"/>
    <circle cx="44"  cy="205" r="4"/>
    <circle cx="165" cy="225" r="5"/>
    <circle cx="90"  cy="233" r="4"/>
  </g>

  <!-- Zone 1 label -->
  <text x="28" y="99"  font-size="9"   font-weight="700" fill="rgba(155,22,22,0.76)" letter-spacing="1">BLOOD</text>
  <text x="28" y="110" font-size="8.5" fill="rgba(155,22,22,0.54)" font-style="italic">RBCs · proteins</text>

  <!-- RBC blocked marker -->
  <circle cx="170" cy="113" r="12" fill="rgba(220,30,30,0.93)" stroke="#fff" stroke-width="1.5"/>
  <line x1="164" y1="107" x2="176" y2="119" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="176" y1="107" x2="164" y2="119" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>
  <text x="170" y="133" text-anchor="middle" font-size="8.5" fill="rgba(185,20,20,0.85)" font-weight="700">RBCs</text>

  <!-- Fenestrae on right face of endothelium -->
  <g fill="white" stroke="rgba(165,40,40,0.38)" stroke-width="0.8">
    <ellipse cx="193" cy="103" rx="4" ry="7"/>
    <ellipse cx="193" cy="127" rx="4" ry="7"/>
    <ellipse cx="193" cy="151" rx="4" ry="7"/>
    <ellipse cx="193" cy="175" rx="4" ry="7"/>
    <ellipse cx="193" cy="199" rx="4" ry="7"/>
    <ellipse cx="193" cy="223" rx="4" ry="7"/>
    <ellipse cx="193" cy="247" rx="4" ry="7"/>
  </g>

  <!-- Glycocalyx negative charges -->
  <g font-size="10" font-weight="bold" fill="rgba(140,28,28,0.66)" text-anchor="middle">
    <text x="178" y="105">−</text><text x="178" y="129">−</text>
    <text x="178" y="153">−</text><text x="178" y="177">−</text>
    <text x="178" y="201">−</text><text x="178" y="225">−</text>
    <text x="178" y="249">−</text>
  </g>

  <!-- ══ ZONE 2 CONTENT: BASEMENT MEMBRANE (y 80–275) ══ -->

  <!-- Wavy collagen texture -->
  <g stroke="rgba(65,32,188,0.17)" stroke-width="1.3" fill="none">
    <path d="M197,86  Q212,82  227,86  Q242,90  257,86  Q272,82  287,86  Q302,90  317,86  Q332,82  347,86"/>
    <path d="M197,104 Q212,100 227,104 Q242,108 257,104 Q272,100 287,104 Q302,108 317,104 Q332,100 347,104"/>
    <path d="M197,122 Q212,118 227,122 Q242,126 257,122 Q272,118 287,122 Q302,126 317,122 Q332,118 347,122"/>
    <path d="M197,140 Q212,136 227,140 Q242,144 257,140 Q272,136 287,140 Q302,144 317,140 Q332,136 347,140"/>
    <path d="M197,158 Q212,154 227,158 Q242,162 257,158 Q272,154 287,158 Q302,162 317,158 Q332,154 347,158"/>
    <path d="M197,176 Q212,172 227,176 Q242,180 257,176 Q272,172 287,176 Q302,180 317,176 Q332,172 347,176"/>
    <path d="M197,194 Q212,190 227,194 Q242,198 257,194 Q272,190 287,194 Q302,198 317,194 Q332,190 347,194"/>
    <path d="M197,212 Q212,208 227,212 Q242,216 257,212 Q272,208 287,212 Q302,216 317,212 Q332,208 347,212"/>
    <path d="M197,230 Q212,226 227,230 Q242,234 257,230 Q272,226 287,230 Q302,234 317,230 Q332,226 347,230"/>
    <path d="M197,248 Q212,244 227,248 Q242,252 257,248 Q272,244 287,248 Q302,252 317,248"/>
  </g>

  <!-- GBM heparan sulphate negative charges -->
  <g font-size="8.5" font-weight="bold" fill="rgba(52,26,165,0.48)" text-anchor="middle">
    <text x="210" y="96">−</text><text x="236" y="96">−</text><text x="262" y="96">−</text><text x="288" y="96">−</text><text x="314" y="96">−</text><text x="342" y="96">−</text>
    <text x="210" y="114">−</text><text x="238" y="114">−</text><text x="266" y="114">−</text><text x="294" y="114">−</text><text x="322" y="114">−</text><text x="350" y="114">−</text>
    <text x="210" y="132">−</text><text x="238" y="132">−</text><text x="266" y="132">−</text><text x="294" y="132">−</text><text x="320" y="132">−</text>
    <text x="210" y="150">−</text><text x="238" y="150">−</text><text x="266" y="150">−</text><text x="294" y="150">−</text><text x="322" y="150">−</text><text x="350" y="150">−</text>
    <text x="210" y="168">−</text><text x="238" y="168">−</text><text x="266" y="168">−</text><text x="294" y="168">−</text><text x="320" y="168">−</text>
    <text x="210" y="186">−</text><text x="238" y="186">−</text><text x="266" y="186">−</text><text x="294" y="186">−</text><text x="322" y="186">−</text><text x="350" y="186">−</text>
    <text x="210" y="204">−</text><text x="238" y="204">−</text><text x="266" y="204">−</text><text x="294" y="204">−</text><text x="320" y="204">−</text>
    <text x="210" y="222">−</text><text x="238" y="222">−</text><text x="266" y="222">−</text><text x="294" y="222">−</text><text x="322" y="222">−</text><text x="350" y="222">−</text>
    <text x="210" y="240">−</text><text x="238" y="240">−</text><text x="266" y="240">−</text><text x="294" y="240">−</text><text x="320" y="240">−</text>
  </g>

  <!-- Albumin proteins in GBM -->
  <ellipse cx="252" cy="129" rx="14" ry="9" fill="rgba(195,118,32,0.72)" stroke="rgba(145,78,8,0.50)" stroke-width="1"/>
  <ellipse cx="252" cy="199" rx="14" ry="9" fill="rgba(195,118,32,0.72)" stroke="rgba(145,78,8,0.50)" stroke-width="1"/>
  <ellipse cx="320" cy="164" rx="14" ry="9" fill="rgba(195,118,32,0.72)" stroke="rgba(145,78,8,0.50)" stroke-width="1"/>

  <!-- Small molecules passing through GBM -->
  <g fill="rgba(25,125,195,0.58)">
    <circle cx="216" cy="109" r="5"/><circle cx="260" cy="94"  r="4"/>
    <circle cx="300" cy="104" r="5"/><circle cx="340" cy="93"  r="4"/>
    <circle cx="216" cy="234" r="4"/><circle cx="266" cy="246" r="5"/>
    <circle cx="310" cy="232" r="4"/><circle cx="348" cy="243" r="5"/>
  </g>

  <!-- Albumin blocked marker in GBM -->
  <circle cx="338" cy="124" r="13" fill="rgba(220,30,30,0.92)" stroke="#fff" stroke-width="1.5"/>
  <line x1="331" y1="117" x2="345" y2="131" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="345" y1="117" x2="331" y2="131" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>
  <text x="338" y="146" text-anchor="middle" font-size="8.5" fill="rgba(185,20,20,0.85)" font-weight="700">Albumin</text>

  <!-- ══ ZONE 3 CONTENT: EPITHELIUM / FILTRATE (y 80–275) ══ -->

  <!-- Podocyte foot processes -->
  <g fill="rgba(20,140,75,0.20)" stroke="rgba(15,105,55,0.52)" stroke-width="1">
    <rect x="358" y="80" width="18" height="140" rx="7"/>
    <rect x="382" y="90" width="18" height="130" rx="7"/>
    <rect x="406" y="80" width="18" height="135" rx="7"/>
  </g>

  <!-- Slit diaphragms -->
  <g stroke="rgba(8,78,35,0.88)" stroke-width="2.5" stroke-linecap="round">
    <line x1="376" y1="192" x2="382" y2="192"/>
    <line x1="400" y1="196" x2="406" y2="196"/>
  </g>

  <!-- Filtrate: small molecules only -->
  <g fill="rgba(25,125,195,0.62)">
    <circle cx="440" cy="94"  r="5"/><circle cx="472" cy="84"  r="4"/>
    <circle cx="510" cy="92"  r="5"/><circle cx="545" cy="83"  r="4"/>
    <circle cx="430" cy="129" r="4"/><circle cx="465" cy="122" r="5"/>
    <circle cx="498" cy="132" r="4"/><circle cx="533" cy="121" r="5"/>
    <circle cx="565" cy="129" r="4"/>
    <circle cx="438" cy="169" r="5"/><circle cx="468" cy="162" r="4"/>
    <circle cx="503" cy="172" r="5"/><circle cx="538" cy="162" r="4"/>
    <circle cx="572" cy="170" r="5"/>
    <circle cx="432" cy="209" r="4"/><circle cx="466" cy="202" r="5"/>
    <circle cx="500" cy="212" r="4"/><circle cx="535" cy="202" r="5"/>
    <circle cx="568" cy="210" r="4"/>
    <circle cx="440" cy="242" r="5"/><circle cx="475" cy="234" r="4"/>
    <circle cx="510" cy="242" r="5"/><circle cx="548" cy="232" r="4"/>
  </g>

  <!-- Ghosted albumin absent from filtrate -->
  <ellipse cx="510" cy="154" rx="13" ry="9" fill="rgba(195,118,32,0.13)" stroke="rgba(145,78,8,0.20)" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="526" cy="142" r="13" fill="rgba(220,30,30,0.92)" stroke="#fff" stroke-width="1.5"/>
  <line x1="519" y1="135" x2="533" y2="149" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="533" y1="135" x2="519" y2="149" stroke="#fff" stroke-width="2.8" stroke-linecap="round"/>
  <text x="510" y="176" text-anchor="middle" font-size="8.5" fill="rgba(185,20,20,0.85)" font-weight="700">Albumin</text>

  <!-- ══ FILTRATION DIRECTION ARROW ══ -->
  <line x1="28" y1="285" x2="572" y2="285"
        stroke="rgba(60,80,180,0.28)" stroke-width="1.4"
        stroke-dasharray="6,4" marker-end="url(#ab)"/>
  <text x="300" y="297" text-anchor="middle" font-size="9" fill="rgba(60,80,180,0.52)"
        letter-spacing="1">FILTRATION DIRECTION →</text>

  <!-- ══ LEGEND ══ -->
  <rect x="14" y="308" width="262" height="18" rx="3"
        fill="rgba(240,240,248,0.88)" stroke="rgba(180,180,210,0.35)" stroke-width="0.8"/>
  <ellipse cx="34"  cy="317" rx="10" ry="6" fill="rgba(205,48,48,0.75)"/>
  <text x="48"  y="321" font-size="8.5" fill="#555">Red blood cell</text>
  <ellipse cx="124" cy="317" rx="9"  ry="6" fill="rgba(195,118,32,0.70)"/>
  <text x="137" y="321" font-size="8.5" fill="#555">Plasma protein</text>
  <circle cx="213" cy="317" r="4.5" fill="rgba(25,125,195,0.62)"/>
  <text x="221" y="321" font-size="8.5" fill="#555">Filtrate molecule</text>

</svg>

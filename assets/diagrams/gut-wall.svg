<svg viewBox="0 0 490 308" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">

  <!-- card background -->
  <rect width="490" height="308" fill="#f4f7fc" rx="4"/>

  <!-- ── LUMEN ── -->
  <rect x="20" y="18" width="278" height="47" rx="2"
        fill="rgba(60,120,220,0.07)" stroke="rgba(60,120,220,0.28)" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ── MUCOSA block (epithelium + LP + MM) ── -->
  <rect x="20" y="65" width="278" height="73"
        fill="rgba(30,160,100,0.1)" stroke="rgba(30,160,100,0.45)" stroke-width="1.3"/>

  <!-- Epithelial cells (columnar, inside mucosa) -->
  <g fill="rgba(30,160,100,0.25)" stroke="rgba(30,160,100,0.6)" stroke-width="0.8">
    <rect x="20"  y="65" width="19" height="31" rx="1"/>
    <rect x="40"  y="63" width="19" height="33" rx="1"/>
    <rect x="60"  y="65" width="19" height="31" rx="1"/>
    <rect x="80"  y="64" width="19" height="32" rx="1"/>
    <rect x="100" y="65" width="19" height="31" rx="1"/>
    <rect x="120" y="63" width="19" height="33" rx="1"/>
    <rect x="140" y="65" width="19" height="31" rx="1"/>
    <rect x="160" y="64" width="19" height="32" rx="1"/>
    <rect x="180" y="65" width="19" height="31" rx="1"/>
    <rect x="200" y="63" width="19" height="33" rx="1"/>
    <rect x="220" y="65" width="19" height="31" rx="1"/>
    <rect x="240" y="64" width="19" height="32" rx="1"/>
    <rect x="260" y="65" width="19" height="31" rx="1"/>
    <rect x="280" y="63" width="18" height="33" rx="1"/>
  </g>

  <!-- Basal nuclei -->
  <g fill="rgba(10,120,70,0.45)" stroke="none">
    <ellipse cx="29"  cy="91" rx="6" ry="3.5"/>
    <ellipse cx="49"  cy="91" rx="6" ry="3.5"/>
    <ellipse cx="69"  cy="91" rx="6" ry="3.5"/>
    <ellipse cx="89"  cy="91" rx="6" ry="3.5"/>
    <ellipse cx="109" cy="91" rx="6" ry="3.5"/>
    <ellipse cx="129" cy="91" rx="6" ry="3.5"/>
    <ellipse cx="149" cy="91" rx="6" ry="3.5"/>
    <ellipse cx="169" cy="91" rx="6" ry="3.5"/>
    <ellipse cx="189" cy="91" rx="6" ry="3.5"/>
    <ellipse cx="209" cy="91" rx="6" ry="3.5"/>
    <ellipse cx="229" cy="91" rx="6" ry="3.5"/>
    <ellipse cx="249" cy="91" rx="6" ry="3.5"/>
    <ellipse cx="269" cy="91" rx="6" ry="3.5"/>
    <ellipse cx="289" cy="91" rx="6" ry="3.5"/>
  </g>

  <!-- Brush border / microvilli (project into lumen) -->
  <g stroke="rgba(30,160,100,0.55)" stroke-width="1">
    <line x1="23" y1="65" x2="23" y2="59"/><line x1="27" y1="65" x2="27" y2="57"/><line x1="31" y1="65" x2="31" y2="59"/><line x1="35" y1="65" x2="35" y2="58"/>
    <line x1="43" y1="63" x2="43" y2="57"/><line x1="47" y1="63" x2="47" y2="55"/><line x1="51" y1="63" x2="51" y2="57"/><line x1="55" y1="63" x2="55" y2="56"/>
    <line x1="63" y1="65" x2="63" y2="59"/><line x1="67" y1="65" x2="67" y2="57"/><line x1="71" y1="65" x2="71" y2="59"/><line x1="75" y1="65" x2="75" y2="58"/>
    <line x1="83" y1="64" x2="83" y2="58"/><line x1="87" y1="64" x2="87" y2="56"/><line x1="91" y1="64" x2="91" y2="58"/><line x1="95" y1="64" x2="95" y2="57"/>
    <line x1="103" y1="65" x2="103" y2="59"/><line x1="107" y1="65" x2="107" y2="57"/><line x1="111" y1="65" x2="111" y2="59"/><line x1="115" y1="65" x2="115" y2="58"/>
    <line x1="123" y1="63" x2="123" y2="57"/><line x1="127" y1="63" x2="127" y2="55"/><line x1="131" y1="63" x2="131" y2="57"/><line x1="135" y1="63" x2="135" y2="56"/>
    <line x1="143" y1="65" x2="143" y2="59"/><line x1="147" y1="65" x2="147" y2="57"/><line x1="151" y1="65" x2="151" y2="59"/><line x1="155" y1="65" x2="155" y2="58"/>
    <line x1="163" y1="64" x2="163" y2="58"/><line x1="167" y1="64" x2="167" y2="56"/><line x1="171" y1="64" x2="171" y2="58"/><line x1="175" y1="64" x2="175" y2="57"/>
    <line x1="183" y1="65" x2="183" y2="59"/><line x1="187" y1="65" x2="187" y2="57"/><line x1="191" y1="65" x2="191" y2="59"/><line x1="195" y1="65" x2="195" y2="58"/>
    <line x1="203" y1="63" x2="203" y2="57"/><line x1="207" y1="63" x2="207" y2="55"/><line x1="211" y1="63" x2="211" y2="57"/><line x1="215" y1="63" x2="215" y2="56"/>
    <line x1="223" y1="65" x2="223" y2="59"/><line x1="227" y1="65" x2="227" y2="57"/><line x1="231" y1="65" x2="231" y2="59"/><line x1="235" y1="65" x2="235" y2="58"/>
    <line x1="243" y1="64" x2="243" y2="58"/><line x1="247" y1="64" x2="247" y2="56"/><line x1="251" y1="64" x2="251" y2="58"/><line x1="255" y1="64" x2="255" y2="57"/>
    <line x1="263" y1="65" x2="263" y2="59"/><line x1="267" y1="65" x2="267" y2="57"/><line x1="271" y1="65" x2="271" y2="59"/><line x1="275" y1="65" x2="275" y2="58"/>
    <line x1="283" y1="63" x2="283" y2="57"/><line x1="287" y1="63" x2="287" y2="55"/><line x1="291" y1="63" x2="291" y2="57"/><line x1="295" y1="63" x2="295" y2="56"/>
  </g>

  <!-- Muscularis mucosae (dashed line at base of mucosa) -->
  <line x1="20" y1="128" x2="298" y2="128" stroke="rgba(30,160,100,0.4)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="22" y="125" font-size="8.5" fill="rgba(20,110,65,0.6)" font-style="italic">muscularis mucosae</text>

  <!-- ── SUBMUCOSA ── -->
  <rect x="20" y="138" width="278" height="53"
        fill="rgba(200,150,20,0.1)" stroke="rgba(180,130,10,0.4)" stroke-width="1.3"/>
  <circle cx="88"  cy="164" r="5"  fill="rgba(180,130,10,0.65)" stroke="rgba(140,100,5,0.6)" stroke-width="1.2"/>
  <circle cx="188" cy="161" r="5"  fill="rgba(180,130,10,0.65)" stroke="rgba(140,100,5,0.6)" stroke-width="1.2"/>
  <circle cx="268" cy="166" r="5"  fill="rgba(180,130,10,0.65)" stroke="rgba(140,100,5,0.6)" stroke-width="1.2"/>
  <text x="22" y="178" font-size="8.5" fill="rgba(130,90,5,0.65)" font-style="italic">Meissner's plexus</text>

  <!-- ── MUSCULARIS EXTERNA — CIRCULAR ── -->
  <rect x="20" y="191" width="278" height="36"
        fill="rgba(180,60,60,0.14)" stroke="rgba(160,50,50,0.45)" stroke-width="1.3"/>
  <g stroke="rgba(160,50,50,0.2)" stroke-width="1">
    <line x1="20" y1="198" x2="298" y2="198"/>
    <line x1="20" y1="205" x2="298" y2="205"/>
    <line x1="20" y1="212" x2="298" y2="212"/>
    <line x1="20" y1="219" x2="298" y2="219"/>
  </g>

  <!-- Auerbach's plexus -->
  <circle cx="108" cy="227" r="5.5" fill="rgba(210,90,30,0.8)"  stroke="rgba(160,60,10,0.6)" stroke-width="1.2"/>
  <circle cx="218" cy="227" r="5.5" fill="rgba(210,90,30,0.8)"  stroke="rgba(160,60,10,0.6)" stroke-width="1.2"/>
  <text x="22" y="223" font-size="8.5" fill="rgba(160,70,10,0.7)" font-style="italic">Auerbach's plexus</text>

  <!-- ── MUSCULARIS EXTERNA — LONGITUDINAL (dots) ── -->
  <rect x="20" y="227" width="278" height="36"
        fill="rgba(180,60,60,0.08)" stroke="rgba(160,50,50,0.32)" stroke-width="1"/>
  <g fill="rgba(160,50,50,0.28)" stroke="rgba(160,50,50,0.12)" stroke-width="0.5">
    <circle cx="33"  cy="237" r="3.2"/><circle cx="53"  cy="239" r="2.8"/><circle cx="73"  cy="236" r="3"/>
    <circle cx="93"  cy="238" r="2.8"/><circle cx="113" cy="237" r="3.2"/><circle cx="133" cy="239" r="2.8"/>
    <circle cx="153" cy="236" r="3"/><circle cx="173" cy="238" r="3.2"/><circle cx="193" cy="237" r="2.8"/>
    <circle cx="213" cy="239" r="3"/><circle cx="233" cy="236" r="3.2"/><circle cx="253" cy="238" r="2.8"/>
    <circle cx="273" cy="237" r="3"/><circle cx="290" cy="239" r="2.5"/>
    <circle cx="43"  cy="251" r="2.8"/><circle cx="63"  cy="253" r="3"/><circle cx="83"  cy="250" r="2.5"/>
    <circle cx="103" cy="252" r="3.2"/><circle cx="123" cy="251" r="2.8"/><circle cx="143" cy="253" r="3"/>
    <circle cx="163" cy="250" r="2.5"/><circle cx="183" cy="252" r="3.2"/><circle cx="203" cy="251" r="2.8"/>
    <circle cx="223" cy="253" r="3"/><circle cx="243" cy="250" r="2.5"/><circle cx="263" cy="252" r="3.2"/>
    <circle cx="283" cy="251" r="2.8"/>
  </g>

  <!-- ── SEROSA ── -->
  <rect x="20" y="263" width="278" height="24"
        fill="rgba(120,80,200,0.1)" stroke="rgba(100,60,180,0.38)" stroke-width="1.2"/>

  <!-- ════ RIGHT LABELS ════ -->

  <!-- Lumen -->
  <line x1="300" y1="41" x2="316" y2="41" stroke="#2255a0" stroke-width="1" opacity="0.5"/>
  <text x="320" y="45" font-size="11.5" font-weight="500" fill="#2255a0">Lumen</text>

  <!-- Mucosa bracket -->
  <line x1="300" y1="65"  x2="306" y2="65"  stroke="#1a7a50" stroke-width="1" opacity="0.6"/>
  <line x1="306" y1="65"  x2="306" y2="138" stroke="#1a7a50" stroke-width="1" opacity="0.4"/>
  <line x1="300" y1="138" x2="306" y2="138" stroke="#1a7a50" stroke-width="1" opacity="0.6"/>
  <line x1="306" y1="101" x2="316" y2="101" stroke="#1a7a50" stroke-width="1" opacity="0.5"/>
  <!-- Sub-labels -->
  <text x="320" y="73"  font-size="9.5"  fill="#2a9068" font-style="italic">simple columnar epithelium</text>
  <text x="320" y="85"  font-size="9.5"  fill="#2a9068" font-style="italic">+ brush border (microvilli)</text>
  <!-- Main label -->
  <text x="320" y="104" font-size="12"   font-weight="700" fill="#1a7a50">Mucosa</text>
  <text x="320" y="116" font-size="9.5"  fill="#2a9068" font-style="italic">lamina propria</text>
  <text x="320" y="130" font-size="9"    fill="#3aaa78" font-style="italic">·· muscularis mucosae</text>

  <!-- Submucosa -->
  <line x1="300" y1="164" x2="316" y2="164" stroke="#7a5505" stroke-width="1" opacity="0.55"/>
  <text x="320" y="160" font-size="12"   font-weight="700" fill="#7a5505">Submucosa</text>

  <!-- Muscularis externa -->
  <line x1="300" y1="209" x2="316" y2="200" stroke="#7a1818" stroke-width="1" opacity="0.55"/>
  <text x="320" y="197" font-size="12"   font-weight="700" fill="#7a1818">Muscularis</text>
  <text x="320" y="210" font-size="12"   font-weight="700" fill="#7a1818">externa</text>
  <text x="320" y="223" font-size="9.5"  fill="#9a2828" font-style="italic">· inner circular</text>
  <text x="320" y="247" font-size="9.5"  fill="#9a2828" font-style="italic">· outer longitudinal</text>

  <!-- Serosa -->
  <line x1="300" y1="275" x2="316" y2="275" stroke="#4a2080" stroke-width="1" opacity="0.5"/>
  <text x="320" y="271" font-size="12"   font-weight="700" fill="#4a2080">Serosa</text>
  <text x="320" y="284" font-size="9.5"  fill="#6a3aaa" font-style="italic">(or adventitia)</text>

  <!-- Footnote -->
  <text x="159" y="302" text-anchor="middle" font-size="8.5" fill="rgba(80,100,140,0.45)" font-style="italic">transverse section · small intestine · not to scale</text>
</svg>

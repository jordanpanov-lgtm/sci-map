name: CI

# Validates every folio against the schema + referential-integrity rules, and
# guarantees the committed _global_index.json matches a fresh rebuild. Runs on
# pushes and PRs; this is separate from the automatic Pages deployment.

on:
  push:
    branches: ["**"]
    paths:
      - "modules/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "modules/**"
      - ".github/workflows/ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate folios (schema + referential integrity)
        run: node modules/validate.js

      - name: Rebuild global index
        run: node modules/build-global-index.js

      - name: Fail if committed _global_index.json is stale
        run: |
          if ! git diff --quiet -- modules/_global_index.json; then
            echo "::error::modules/_global_index.json is out of date."
            echo "Run 'node modules/build-global-index.js' and commit the result."
            git diff -- modules/_global_index.json | head -80
            exit 1
          fi
          echo "Global index is in sync."
